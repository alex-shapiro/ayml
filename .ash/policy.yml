# yaml-language-server: $schema=https://hub.ashell.dev/schemas/policy/v1.json

schema_version: 1
dependencies:
  ash/base-macos: ^0
  ash/claude-code: ^0.0.4
  ash/git: ^0
  ash/github: ^0.0.1
  ash/rust-dev: ^0
files:
  rules:
  - path: ./**
  - path: /Applications/Visual Studio Code.app/Contents/Resources/app/bin/code
    operations:
    - read
  - path: /Library/Apple/usr/bin
    operations:
    - read
  - path: /Users
    operations:
    - read
  - path: /opt/X11/bin
    action: deny
  - path: ~/.zprofile
    action: deny
    operations:
    - read
  - path: ~/Library/Application Support/**
    action: deny
  - path: ~/Library/Python/3.9/lib/python/site-packages
    operations:
    - read
  - path: ~/Projects
    operations:
    - read
network:
  rules:
  - host: yaml.org
exec:
  rules:
  - path: ./ayml/fuzz/target/**
  - path: ./target/**
  - path: /opt/homebrew/Cellar/tree/*/bin/tree
  - path: ~/.cargo/bin/cargo-fuzz
io_devices:
  rules: []
